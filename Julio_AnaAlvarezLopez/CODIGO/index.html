<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pruebas de Entidades de Base de Datos</title>
    <link rel="stylesheet" href="css/IU.css">
    
    <!-- Scripts de configuración -->
    <script src="menu_entidades.js"></script>
    <script src="Julio_Datos_AnaAlvarezLopez.js"></script>
    
    <!-- Scripts de estructuras de entidades -->
    <script src="characteristic_estructura.js"></script>
    <script src="project_estructura.js"></script>
    <script src="analysis_preparation_estructura.js"></script>
    
    <!-- Scripts de tests de entidades -->
    <script src="characteristic_tests.js"></script>
    <script src="project_tests.js"></script>
    <script src="analysis_preparation_tests.js"></script>
    
    <!-- Scripts de TestSubmit de entidades -->
    <script src="characteristic_TestSubmit.js"></script>
    <script src="project_TestSubmit.js"></script>
    <script src="analysis_preparation_TestSubmit.js"></script>
    
    <!-- Scripts de clases de entidades (opcionales) -->
    <script src="characteristic_Class.js"></script>
    <script src="project_Class.js"></script>
    <script src="analysis_preparation_Class.js"></script>
    
    <!-- Scripts de clases y utilidades -->
    <script src="Validations_Class.js"></script>
    <script src="ValidateFieldsForm_Class.js"></script>
    <script src="Gestor_Class.js"></script>
    <script src="TestForm_Class.js"></script>
    <script src="TestSubmit_Class.js"></script>
</head>
<body>
    <!-- Encabezado -->
    <header>
        <div class="header-container">
            <h1>Sistema de Pruebas de Entidades</h1>
            <a href="API.html" class="api-icon" title="Documentación API">
                <span class="icon">📚</span>
            </a>
        </div>
    </header>

    <!-- Menú de entidades -->
    <main class="main-container">
        <nav>
            <div class="menu-container">
                <h3 class="menu-title">Entidades</h3>
                <div id="entityMenu" class="menu-items"></div>
            </div>
        </nav>

        <!-- Área de trabajo -->
        <div id="workArea" class="work-area">
            <p class="welcome-message">Selecciona una entidad del menú para comenzar.</p>
        </div>
    </main>

    <!-- Pie de página -->
    <footer>
        <div class="footer-content">
            <p>Alumno: <span id="studentName"></span> | DNI: <span id="studentDNI"></span> | Horas: <span id="studentHours"></span></p>
            <p>&copy; 2026 Sistema de Pruebas de Entidades. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Modal de errores -->
    <div id="errorModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Error</h2>
                <button class="close-btn" onclick="closeErrorModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="errorMessage"></p>
            </div>
            <div class="modal-footer">
                <button onclick="closeErrorModal()" class="btn-primary">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Script de inicialización -->
    <script>
        // Inicializar la aplicación
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
        });

        function initializeApp() {
            // Mostrar información del alumno
            if (typeof info_entrega !== 'undefined' && Array.isArray(info_entrega)) {
                document.getElementById('studentName').textContent = info_entrega[2];
                document.getElementById('studentDNI').textContent = info_entrega[1];
                document.getElementById('studentHours').textContent = info_entrega[3];
            }

            // Construir menú de entidades
            if (typeof menu_entidades !== 'undefined' && Array.isArray(menu_entidades)) {
                const entityMenu = document.getElementById('entityMenu');
                menu_entidades.forEach(entidad => {
                    const div = document.createElement('div');
                    div.className = 'menu-item';
                    div.textContent = entidad.charAt(0).toUpperCase() + entidad.slice(1).replace(/_/g, ' ');
                    div.onclick = () => selectEntity(entidad);
                    entityMenu.appendChild(div);
                });
            }

            // Toggle menú
            const menuBtn = document.getElementById('menuBtn');
            if (menuBtn) {
                menuBtn.addEventListener('click', function() {
                    const menu = document.getElementById('entityMenu');
                    menu.classList.toggle('active');
                });
            }
        }

        function selectEntity(entityName) {
            const workArea = document.getElementById('workArea');
            
            // Cerrar menú
            document.getElementById('entityMenu').classList.remove('active');

            // Instanciar Gestor y cargar entidad
            try {
                const gestor = new Gestor(entityName);
                gestor.loadEntity(workArea);
            } catch (error) {
                showErrorModal('Error al cargar la entidad: ' + error.message);
            }
        }

        function showErrorModal(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorModal').style.display = 'flex';
        }

        function closeErrorModal() {
            document.getElementById('errorModal').style.display = 'none';
        }

        // Funciones para los botones de test
        function testAttributesButton(entityName) {
            try {
                const gestor = new Gestor(entityName);
                const testForm = new TestForm(entityName, gestor.entityData.estructura);
                testForm.analyze();
            } catch (error) {
                showErrorModal('Error en TestForm: ' + error.message);
            }
        }

        function testFormButton(entityName) {
            try {
                const gestor = new Gestor(entityName);
                const testSubmit = new TestSubmit(entityName, gestor.entityData.testSubmit);
                testSubmit.analyze();
            } catch (error) {
                showErrorModal('Error en TestSubmit: ' + error.message);
            }
        }

        // Script de depuración para verificar variables cargadas
        window.debugVariableLoading = function() {
            const entities = ['characteristic', 'project', 'analysis_preparation'];
            const results = {};
            
            entities.forEach(entity => {
                results[entity] = {
                    estructura: typeof window[`${entity}_estructura`],
                    def_tests: typeof window[`${entity}_def_tests`],
                    tests_fields: typeof window[`${entity}_tests_fields`],
                    TestSubmit: typeof window[`${entity}_TestSubmit`]
                };
            });
            
            console.log('Variable Loading Status:', results);
            return results;
        };

        // Ejecutar depuración al cargar
        window.addEventListener('load', function() {
            console.log('All scripts loaded, checking variables...');
            window.debugVariableLoading();
        });
    </script>
</body>
</html>
